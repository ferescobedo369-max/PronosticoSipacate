name: Actualizacion Pronostico Sipacate

on:
  schedule:
    # 7:00 AM Guatemala = 13:00 UTC
   - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgdal-dev gdal-bin libspatialindex-dev \
            libreoffice --no-install-recommends

      - name: Instalar librerias Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generar datos CSV
        run: python 1_Median_and_average_conditions.py

      - name: Generar mapas y graficas
        run: python 3_Map_200.py

      - name: Generar boletin PDF
        run: python 4_Generar_Boletin.py

      - name: Enviar boletin por correo
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          DESTINATARIOS: ${{ secrets.DESTINATARIOS }}
        run: python 5_Enviar_Correo.py

      - name: Guardar resultados en el repositorio
        run: |
          git config --global user.name 'actions-user'
          git config --global user.email 'action@github.com'
          git add 2_Results/
          git diff --staged --quiet || git commit -m "Actualizacion automatica - $(TZ='America/Guatemala' date +'%Y-%m-%d %H:%M') hora Guatemala"
          git push
